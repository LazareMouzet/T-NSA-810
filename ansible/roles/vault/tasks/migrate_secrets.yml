---
- name: Migration des secrets vers HashiCorp Vault
  vars:
    vault_kv_mount_name: "{{ vault_kv_mount_path | regex_replace('/+$', '') }}"
    vault_kv_mount_key: "{{ vault_kv_mount_name ~ '/' }}"
    vault_secret_items_to_migrate: >-
      {{
        vault_secret_migration_items
        + ([vault_bootstrap_secret_item] if (vault_migrate_bootstrap_secrets | bool) else [])
      }}
  block:
    - name: Vérifier la présence d'un token de migration Vault
      ansible.builtin.assert:
        that:
          - vault_migration_token | default(vault_policy_token | default(vault_root_token | default(''))) | length > 0
        fail_msg: >-
          Définissez vault_migration_token (ou vault_policy_token / vault_root_token)
          dans inventory/group_vars/all/vault.yml avant de migrer les secrets.
      no_log: true

    - name: Récupérer les engines de secrets Vault
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/mounts"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_migration_token | default(vault_policy_token | default(vault_root_token)) }}"
        return_content: true
        status_code: 200
      register: vault_migration_mounts
      no_log: true

    - name: Activer le mount KV v2 si absent
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/mounts/{{ vault_kv_mount_name }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_migration_token | default(vault_policy_token | default(vault_root_token)) }}"
        body_format: json
        body:
          type: kv
          options:
            version: "2"
        status_code:
          - 200
          - 204
      no_log: true
      when: vault_kv_mount_key not in vault_migration_mounts.json

    - name: Vérifier que le mount cible est en KV v2
      ansible.builtin.assert:
        that:
          - vault_migration_mounts.json[vault_kv_mount_key].type == "kv"
          - (vault_migration_mounts.json[vault_kv_mount_key].options.version | default("2")) == "2"
        fail_msg: >-
          Le mount {{ vault_kv_mount_name }} existe mais n'est pas en KV v2.
      when: vault_kv_mount_key in vault_migration_mounts.json
      no_log: true

    - name: Écrire les secrets dans Vault
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/{{ vault_kv_mount_name }}/data/{{ item.path }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_migration_token | default(vault_policy_token | default(vault_root_token)) }}"
        body_format: json
        body:
          data: "{{ item.data }}"
        status_code:
          - 200
          - 204
      loop: "{{ vault_secret_items_to_migrate }}"
      loop_control:
        label: "{{ item.path }}"
      no_log: true
      when: not ansible_check_mode
