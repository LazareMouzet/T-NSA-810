---
- name: Migration des secrets vers HashiCorp Vault
  vars:
    vault_migration_management_token: >-
      {{
        vault_migration_token
        | default(vault_policy_token
        | default(vault_root_token | default('')))
      }}
    vault_kv_mount_name: "{{ vault_kv_mount_path | regex_replace('/+$', '') }}"
    vault_kv_mount_key: "{{ vault_kv_mount_name ~ '/' }}"
    vault_default_secret_migration_items:
      - path: infra/ansible/access
        data:
          vault_become_host_outils: "{{ vault_become_host_outils }}"
          vault_become_user_outils: "{{ vault_become_user_outils }}"
          vault_become_port_outils: "{{ vault_become_port_outils }}"
          vault_become_password_outils: "{{ vault_become_password_outils }}"
          vault_become_host_monitoring: "{{ vault_become_host_monitoring }}"
          vault_become_user_monitoring: "{{ vault_become_user_monitoring }}"
          vault_become_port_monitoring: "{{ vault_become_port_monitoring }}"
          vault_become_password_monitoring: "{{ vault_become_password_monitoring }}"
          vault_become_host_bastion: "{{ vault_become_host_bastion }}"
          vault_become_user_bastion: "{{ vault_become_user_bastion }}"
          vault_become_port_bastion: "{{ vault_become_port_bastion }}"
          vault_become_password_bastion: "{{ vault_become_password_bastion }}"
          vault_become_host_intranet: "{{ vault_become_host_intranet }}"
          vault_become_user_intranet: "{{ vault_become_user_intranet }}"
          vault_become_port_intranet: "{{ vault_become_port_intranet }}"
          vault_become_password_intranet: "{{ vault_become_password_intranet }}"
          path_ssh: "{{ path_ssh }}"
      - path: infra/proxmox/api
        data:
          vault_proxmox_api_host_dc1: "{{ vault_proxmox_api_host_dc1 }}"
          vault_proxmox_api_user_dc1: "{{ vault_proxmox_api_user_dc1 }}"
          vault_proxmox_api_token_id_dc1: "{{ vault_proxmox_api_token_id_dc1 }}"
          vault_proxmox_api_token_secret_dc1: "{{ vault_proxmox_api_token_secret_dc1 }}"
      - path: services/netbox/app
        data:
          netbox_db_user_password: "{{ netbox_db_user_password }}"
          netbox_superuser_password: "{{ netbox_superuser_password }}"
          netbox_secret_key: "{{ netbox_secret_key }}"
          netbox_token_api: "{{ netbox_token_api }}"
      - path: services/elasticsearch/app
        data:
          elastic_password: "{{ elastic_password }}"
          kibana_service_account_token: "{{ kibana_service_account_token }}"
    vault_default_bootstrap_secret_item:
      path: services/vault/bootstrap
      data:
        vault_unseal_key: "{{ vault_unseal_key }}"
        vault_root_token: "{{ vault_root_token }}"
    vault_secret_items_to_migrate: >-
      {{
        (vault_secret_migration_items | default(vault_default_secret_migration_items))
        + (
            [vault_bootstrap_secret_item | default(vault_default_bootstrap_secret_item)]
            if (vault_migrate_bootstrap_secrets | bool) else []
          )
      }}
    vault_existing_secret_paths: []
    vault_secret_items_write_target: []
    vault_migration_backup_path: ""
  block:
    - name: Vérifier les variables requises pour la migration des secrets
      ansible.builtin.assert:
        that:
          - vault_migration_management_token | length > 0
          - vault_addr | length > 0
          - vault_kv_mount_name | length > 0
        fail_msg: >-
          Définissez vault_addr, vault_kv_mount_path et vault_migration_token
          (ou vault_policy_token / vault_root_token) dans
          inventory/group_vars/all/vault.yml.
      no_log: true

    - name: Récupérer les engines de secrets Vault
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/mounts"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_migration_management_token }}"
        return_content: true
        status_code:
          - 200
          - 403
      register: vault_migration_mounts
      no_log: true

    - name: Vérifier les droits du token de migration sur sys/mounts
      ansible.builtin.assert:
        that:
          - vault_migration_mounts.status == 200
        fail_msg: >-
          Le token de migration Vault n'a pas les droits requis sur
          /v1/sys/mounts (status={{ vault_migration_mounts.status }}).
      no_log: true

    - name: Activer le mount KV v2 si absent
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/mounts/{{ vault_kv_mount_name }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_migration_management_token }}"
        body_format: json
        body:
          type: kv
          options:
            version: "2"
        status_code:
          - 200
          - 204
          - 403
      register: vault_kv_mount_enable
      no_log: true
      when: vault_kv_mount_key not in vault_migration_mounts.json

    - name: Vérifier les droits du token de migration pour activer KV v2
      ansible.builtin.assert:
        that:
          - vault_kv_mount_enable.status != 403
        fail_msg: >-
          Le token de migration Vault n'a pas les droits requis pour créer
          le mount KV {{ vault_kv_mount_name }}.
      when: vault_kv_mount_key not in vault_migration_mounts.json
      no_log: true

    - name: Vérifier que le mount cible est en KV v2
      ansible.builtin.assert:
        that:
          - vault_migration_mounts.json[vault_kv_mount_key].type == "kv"
          - (vault_migration_mounts.json[vault_kv_mount_key].options.version | default("2")) == "2"
        fail_msg: >-
          Le mount {{ vault_kv_mount_name }} existe mais n'est pas en KV v2.
      when: vault_kv_mount_key in vault_migration_mounts.json
      no_log: true

    - name: Vérifier l'existence des secrets dans Vault
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/{{ vault_kv_mount_name }}/metadata/{{ item.path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_migration_management_token }}"
        status_code:
          - 200
          - 404
          - 403
      loop: "{{ vault_secret_items_to_migrate }}"
      loop_control:
        label: "{{ item.path }}"
      register: vault_migration_existing_secret_checks
      no_log: true
      when: not ansible_check_mode

    - name: Vérifier les droits du token de migration sur les secrets cibles
      ansible.builtin.assert:
        that:
          - (vault_migration_existing_secret_checks.results | selectattr('status', 'equalto', 403) | list | length) == 0
        fail_msg: >-
          Le token de migration Vault n'a pas les droits requis sur les chemins:
          {{
            vault_migration_existing_secret_checks.results
            | selectattr('status', 'equalto', 403)
            | map(attribute='item.path')
            | list
          }}
      no_log: true
      when: not ansible_check_mode

    - name: Construire la liste des secrets déjà existants
      ansible.builtin.set_fact:
        vault_existing_secret_paths: >-
          {{
            vault_migration_existing_secret_checks.results
            | selectattr('status', 'equalto', 200)
            | map(attribute='item.path')
            | list
          }}
      no_log: true
      when: not ansible_check_mode

    - name: Créer un fichier temporaire de backup avant migration
      ansible.builtin.tempfile:
        state: file
        prefix: vault-secrets-backup-
        suffix: .json
      register: vault_migration_backup_file
      when:
        - not ansible_check_mode
        - vault_migration_backup_enabled | bool
        - vault_existing_secret_paths | length > 0

    - name: Enregistrer le chemin du backup de migration
      ansible.builtin.set_fact:
        vault_migration_backup_path: "{{ vault_migration_backup_file.path }}"
      when:
        - not ansible_check_mode
        - vault_migration_backup_enabled | bool
        - vault_existing_secret_paths | length > 0

    - name: Récupérer la version actuelle des secrets existants
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/{{ vault_kv_mount_name }}/data/{{ item }}"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_migration_management_token }}"
        status_code: 200
      loop: "{{ vault_existing_secret_paths }}"
      loop_control:
        label: "{{ item }}"
      register: vault_existing_secret_data
      no_log: true
      when:
        - not ansible_check_mode
        - vault_migration_backup_enabled | bool
        - vault_existing_secret_paths | length > 0

    - name: Sauvegarder les secrets existants avant migration
      ansible.builtin.copy:
        dest: "{{ vault_migration_backup_path }}"
        mode: '0600'
        content: >-
          {{
            {
              'created_at': ansible_date_time.iso8601,
              'mount': vault_kv_mount_name,
              'secrets': dict(
                vault_existing_secret_data.results | map(attribute='item')
                | zip(vault_existing_secret_data.results | map(attribute='json.data.data'))
              )
            } | to_nice_json
          }}
      no_log: true
      when:
        - not ansible_check_mode
        - vault_migration_backup_enabled | bool
        - vault_existing_secret_paths | length > 0

    - name: Bloquer la migration en cas de secrets existants non autorisés à l'écrasement
      ansible.builtin.assert:
        that:
          - vault_migration_overwrite_existing | bool or vault_existing_secret_paths | length == 0
        fail_msg: >-
          Des secrets existent déjà sur les chemins {{ vault_existing_secret_paths }}.
          Migration interrompue pour éviter l'écrasement.
          {{
            'Backup créé: ' ~ vault_migration_backup_path
            if (vault_migration_backup_path | length > 0)
            else 'Activez vault_migration_backup_enabled pour snapshot automatique.'
          }}
      when: not ansible_check_mode

    - name: Déterminer la liste des secrets à écrire
      ansible.builtin.set_fact:
        vault_secret_items_write_target: >-
          {{
            vault_secret_items_to_migrate
            if (vault_migration_overwrite_existing | bool)
            else (
              vault_secret_items_to_migrate
              | rejectattr('path', 'in', vault_existing_secret_paths)
              | list
            )
          }}
      no_log: true
      when: not ansible_check_mode

    - name: Écrire les secrets dans Vault
      block:
        - name: Écrire un secret dans Vault
          ansible.builtin.uri:
            url: "{{ vault_addr }}/v1/{{ vault_kv_mount_name }}/data/{{ item.path }}"
            method: POST
            headers:
              X-Vault-Token: "{{ vault_migration_management_token }}"
            body_format: json
            body:
              data: "{{ item.data }}"
            status_code:
              - 200
              - 204
          loop: "{{ vault_secret_items_write_target }}"
          loop_control:
            label: "{{ item.path }}"
          no_log: true

        - name: Supprimer le backup temporaire après migration réussie
          ansible.builtin.file:
            path: "{{ vault_migration_backup_path }}"
            state: absent
          when:
            - vault_migration_backup_cleanup_on_success | bool
            - vault_migration_backup_path | length > 0

      rescue:
        - name: Échec de migration avec backup conservé
          ansible.builtin.fail:
            msg: >-
              La migration des secrets a échoué. Le backup est conservé ici:
              {{ vault_migration_backup_path if (vault_migration_backup_path | length > 0) else 'aucun backup créé' }}.
      when: not ansible_check_mode
