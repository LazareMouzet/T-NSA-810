---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart Postgresql
  ansible.builtin.service:
    name: postgresql
    state: restarted

- name: Restart Redis
  ansible.builtin.service:
    name: redis
    state: restarted

- name: Restart Nginx
  ansible.builtin.service:
    name: nginx
    state: restarted

- name: Restart Netbox
  ansible.builtin.service:
    name: netbox
    state: restarted

- name: Démarrage et activation de Postgresql
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: true

- name: Démarrage et activation de Redis
  ansible.builtin.systemd:
    name: redis
    state: started
    enabled: true

- name: Démarrage et activation de Nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true

- name: Démarrage et activation de NetBox
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - netbox
    - netbox-rq

- name: Initialisation de l'environnement Python & migrations
  ansible.builtin.command: /opt/netbox/upgrade.sh
  changed_when: false

- name: Collect static files
  ansible.builtin.command:
    cmd: /opt/netbox/venv/bin/python manage.py collectstatic --no-input
    chdir: /opt/netbox/netbox
  changed_when: false
  become: true
  become_user: netbox

- name: Restart filebeat
  ansible.builtin.service:
    name: filebeat
    state: restarted
