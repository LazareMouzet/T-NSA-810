---
- name: Copie de gunicorn.py
  ansible.builtin.copy:
    src: /opt/netbox/contrib/gunicorn.py
    dest: /opt/netbox/gunicorn.py
    remote_src: true
    owner: netbox
    group: netbox
    mode: '0644'

- name: Find systemd service files
  ansible.builtin.find:
    paths: /opt/netbox/contrib/
    patterns: "*.service"
  register: netbox_service_files

- name: Copy systemd service files
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: /etc/systemd/system/
    mode: '0644'
    remote_src: true
  loop: "{{ netbox_service_files.files }}"
