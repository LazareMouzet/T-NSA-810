---
- name: Install web server
  package:
    name: "{{ webserver_package }}"
    state: present

- name: Ensure web server is running
  ansible.builtin.systemd:
    name: "{{ webserver_service }}"
    state: started
    enabled: true
  when: not ansible_check_mode

- name: Create web root directory
  file:
    path: "{{ webserver_site_path }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Deploy website files
  copy:
    src: ../../../site/
    dest: "{{ webserver_site_path }}/"
    owner: www-data
    group: www-data
    mode: '0644'

- name: Deploy nginx virtual host
  template:
    src: site_remote.conf.j2
    dest: "/etc/nginx/sites-available/{{ webserver_site_name }}"
  notify: Reload nginx

- name: Enable website
  file:
    src: "/etc/nginx/sites-available/{{ webserver_site_name }}"
    dest: "/etc/nginx/sites-enabled/{{ webserver_site_name }}"
    state: link
  notify: Reload nginx

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx
  