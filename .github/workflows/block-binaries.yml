---
name: Block binary files

"on":
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  block-binaries:
    name: Prevent binary files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect new/modified binary files
        run: |
          set -e

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          # Cas des premiers commits / exécutions locales où BASE_SHA peut être vide ou nul
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "BASE_SHA vide ou nul, analyse du dernier commit uniquement ($HEAD_SHA)"
            CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r "$HEAD_SHA" --diff-filter=AM)
          else
            echo "Comparaison des changements entre $BASE_SHA et $HEAD_SHA"
            CHANGED_FILES=$(git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA")
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "Aucun fichier ajouté ou modifié."
            exit 0
          fi

          echo "Fichiers ajoutés/modifiés :"
          echo "$CHANGED_FILES"

          # Extensions considérées comme binaires (ajoute/retire selon ton besoin)
          BINARY_PATTERN='\.(pdf|exe|dll|docx|xlsx|pptx|doc|xls|ppt)$'

          VIOLATIONS=$(printf '%s\n' "$CHANGED_FILES" | grep -Ei "$BINARY_PATTERN" || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Des fichiers binaires ont été détectés dans ce push / PR :"
            printf '%s\n' "$VIOLATIONS"
            echo "Ces types de fichiers sont interdits dans ce dépôt."
            exit 1
          fi

          echo "Aucun fichier binaire interdit détecté."
